name: Code Style

on:
  pull_request:

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: |
          npm install --no-save prettier

      - run: |
          npx prettier --check "**/*.{html,css,js}"
